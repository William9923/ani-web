<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>(ﾉ◕ヮ◕)ﾉ ani-web</title>
  <meta name="description" content="Search and watch anime in your browser — lightweight, no sign-up required.">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css"></noscript>
  <script>
    // Generate favicon from kaomoji — no image file needed
    const canvas = document.createElement('canvas')
    canvas.width = 64
    canvas.height = 64
    const ctx = canvas.getContext('2d')
    ctx.font = '44px serif'
    ctx.textAlign = 'center'
    ctx.textBaseline = 'middle'
    ctx.fillText('ﾉ◕', 32, 32)
    const link = document.createElement('link')
    link.rel = 'icon'
    link.href = canvas.toDataURL()
    document.head.appendChild(link)
  </script>
  <script src="/anilist.js"></script>
  <style>
    :root {
      --pico-font-size: 16px;
      --ani-accent: #ff0000;
      --ani-accent-hover: #cc0000;
      --ani-accent-light: #fff0f0;
    }

    html[data-theme="dark"] {
      --ani-accent-light: #2a0000;
    }

    body > main {
      max-width: 860px;
      padding-inline: 1rem;
    }

    h1 {
      margin-bottom: 0.25rem;
    }

    /* ── FAB Menu ── */
    #fab-menu {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.5rem;
    }

    #fab-menu #fab-toggle {
      --pico-color: var(--pico-form-element-color);
      --pico-background-color: var(--pico-form-element-background-color);
      --pico-border-color: var(--pico-form-element-border-color);
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      line-height: 1;
      padding: 0;
      transition: background 0.2s, transform 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    #fab-menu #fab-toggle:hover {
      transform: scale(1.1);
      background: var(--ani-accent-light);
    }

    #fab-items {
      display: none;
      flex-direction: column;
      gap: 0.5rem;
    }

    #fab-menu.open #fab-items {
      display: flex;
      animation: fab-reveal 0.15s ease;
    }

    @keyframes fab-reveal {
      from {
        opacity: 0;
        transform: translateY(-6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── FAB Buttons ── */
    #fab-menu #fab-items button {
      --pico-color: var(--pico-form-element-color);
      --pico-background-color: var(--pico-form-element-background-color);
      --pico-border-color: var(--pico-form-element-border-color);
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1;
      padding: 0;
      transition: background 0.2s, transform 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      position: relative;
    }

    #fab-menu #fab-items button::after {
      content: attr(aria-label);
      position: absolute;
      right: calc(100% + 10px);
      top: 50%;
      transform: translateY(-50%) scale(0.9);
      opacity: 0;
      pointer-events: none;
      background: var(--pico-color);
      color: var(--pico-background-color);
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 500;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.2s;
    }

    #fab-menu #fab-items button:hover::after {
      opacity: 1;
      transform: translateY(-50%) scale(1);
    }

    #fab-menu #fab-items button:hover {
      transform: scale(1.1);
      background: var(--ani-accent-light);
    }

    #theme-toggle {
      font-size: 1.2rem;
    }

    /* ── Search form ── */
    #search-form {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    #search-form input[type="search"] {
      flex: 1;
      min-width: 180px;
      margin-bottom: 0;
    }

    #search-form input[type="search"]:focus {
      border-color: var(--ani-accent);
      box-shadow: 0 0 0 3px var(--ani-accent-light);
    }

    #search-form select {
      width: auto;
      margin-bottom: 0;
    }

    #search-btn {
      width: auto;
      margin-bottom: 0;
      font-weight: 600;
      background: var(--ani-accent);
      border-color: var(--ani-accent);
      color: #fff;
      transition: background 0.2s, transform 0.15s, box-shadow 0.15s;
    }

    #search-btn:hover:not([disabled]) {
      background: var(--ani-accent-hover);
      border-color: var(--ani-accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(255,0,0,0.25);
    }

    #search-btn[aria-busy="true"] {
      opacity: 0.75;
    }

    /* ── Status ── */
    #status {
      min-height: 1.4rem;
      font-size: 0.9rem;
      color: var(--pico-muted-color);
      margin: 0.5rem 0;
    }

    #status.error {
      color: var(--pico-del-color, #c0392b);
    }

    /* ── Results ── */
    #results {
      margin: 0.5rem 0;
    }

    #results article {
      cursor: pointer;
      margin-bottom: 0.5rem;
      border-left: 4px solid var(--ani-accent);
      padding-left: 1rem;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }

    #results article:hover {
      transform: translateX(4px);
      box-shadow: 0 4px 14px rgba(255,0,0,0.12);
      border-left-color: var(--ani-accent-hover);
    }

    .result-title {
      flex: 1;
      font-size: 1rem;
      font-weight: 600;
    }

    .result-meta {
      font-size: 0.82rem;
      color: var(--pico-muted-color);
      white-space: nowrap;
    }

    .result-chevron {
      color: var(--ani-accent);
      font-size: 1.4rem;
      opacity: 0.45;
      transition: opacity 0.15s;
      line-height: 1;
    }

    #results article:hover .result-chevron {
      opacity: 1;
    }

    /* ── Skeleton loaders ── */
    .skeleton-card {
      height: 62px;
      background: linear-gradient(90deg,
        var(--pico-form-element-background-color) 25%,
        var(--ani-accent-light) 50%,
        var(--pico-form-element-background-color) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      margin-bottom: 0.5rem;
      border-radius: var(--pico-border-radius, 6px);
      border-left: 4px solid color-mix(in srgb, var(--ani-accent) 30%, transparent);
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Empty state ── */
    #results.empty {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--pico-muted-color);
      font-size: 0.95rem;
    }

    #results.empty .empty-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 0.75rem;
    }
  </style>
</head>
<body>
  <div id="fab-menu">
    <button id="fab-toggle" aria-label="Menu" aria-expanded="false">☰</button>
    <div id="fab-items">
      <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
      <button id="export-btn" aria-label="Export watch history">↓</button>
      <button id="import-btn" aria-label="Import watch history">↑</button>
      <input id="history-file-input" type="file" accept=".json" style="display:none">
    </div>
  </div>

  <main>
    <h1>(ﾉ◕ヮ◕)ﾉ ani-web</h1>
    <p><small>Search anime to watch</small></p>

    <form id="search-form">
      <input id="search-input" type="search" placeholder="Search anime..." autocomplete="off" autofocus>
      <select id="mode-select" aria-label="Subtitle or dub">
        <option value="sub" selected>Sub</option>
        <option value="dub">Dub</option>
      </select>
      <button id="search-btn" type="submit">Search</button>
    </form>

    <p id="status"></p>

    <div id="results"></div>
  </main>

  <script>
    const state = {
      mode: 'sub',
      history: {}
    }

    // Load history from localStorage
    function loadHistory() {
      try {
        const stored = localStorage.getItem('ani-web-history')
        if (stored) {
          const raw = JSON.parse(stored)
          let migrated = false
          for (const key in raw) {
            if (raw[key]) {
              // Handle old array format: { eps: [1,2,3] } -> { eps: { "1": 0, "2": 0, "3": 0 } }
              if (Array.isArray(raw[key].eps)) {
                const oldEps = raw[key].eps
                raw[key].eps = {}
                for (const ep of oldEps) {
                  raw[key].eps[String(ep)] = raw[key].last_watched_at || 0
                }
                migrated = true
              }
              // Ensure timestamp fields exist
              if (raw[key].last_watched_at == null) raw[key].last_watched_at = 0
              if (raw[key].anilist_updated_at == null) raw[key].anilist_updated_at = 0
              if (raw[key].anilist_progress == null) raw[key].anilist_progress = 0
            }
          }
          state.history = raw
          if (migrated) saveHistory()
        }
      } catch (e) {
        state.history = {}
      }
    }

    // Save history to localStorage
    function saveHistory() {
      localStorage.setItem('ani-web-history', JSON.stringify(state.history))
    }

    // Export history as a JSON file download
    function exportHistory() {
      const json = JSON.stringify(state.history, null, 2)
      const blob = new Blob([json], { type: 'application/json' })
      const url = URL.createObjectURL(blob)
      const a = document.createElement('a')
      a.href = url
      a.download = 'ani-web-history.json'
      a.click()
      URL.revokeObjectURL(url)
    }

    // Import history from a JSON file, merging with existing data
    function importHistory(file) {
      const reader = new FileReader()
      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result)
          if (typeof imported !== 'object' || imported === null || Array.isArray(imported)) {
            setStatus('Invalid history file.', true)
            return
          }
          for (const [id, data] of Object.entries(imported)) {
            // Handle both old array format and new object format
            let eps = null
            if (Array.isArray(data)) {
              eps = data
            } else if (data && data.eps) {
              if (Array.isArray(data.eps)) {
                eps = data.eps
              } else if (typeof data.eps === 'object') {
                // New format: eps is { "1": timestamp, "2": timestamp }
                eps = Object.keys(data.eps).map(Number)
              }
            }
            let title = !Array.isArray(data) && data && data.title ? data.title : null
            if (!eps || eps.length === 0) continue
            
            const now = Date.now()
            if (!state.history[id]) {
              // Convert array to object format with timestamps
              const epsObj = {}
              for (const ep of eps) {
                epsObj[String(ep)] = now
              }
              state.history[id] = { title, eps: epsObj, last_watched_at: now, anilist_updated_at: 0, anilist_progress: 0 }
            } else {
              if (title && !state.history[id].title) state.history[id].title = title
              // Ensure fields exist
              if (!state.history[id].eps || Array.isArray(state.history[id].eps)) {
                if (Array.isArray(state.history[id].eps)) {
                  // Convert old array to object
                  const epsObj = {}
                  for (const ep of state.history[id].eps) {
                    epsObj[String(ep)] = state.history[id].last_watched_at || now
                  }
                  state.history[id].eps = epsObj
                } else {
                  state.history[id].eps = {}
                }
              }
              if (state.history[id].last_watched_at == null) state.history[id].last_watched_at = 0
              if (state.history[id].anilist_updated_at == null) state.history[id].anilist_updated_at = 0
              if (state.history[id].anilist_progress == null) state.history[id].anilist_progress = 0

              // Add imported episodes with current timestamp
              for (const ep of eps) {
                const epStr = String(ep)
                if (!state.history[id].eps[epStr]) {
                  state.history[id].eps[epStr] = now
                }
              }
            }

            // Update last_watched_at to most recent
            const epsObj = state.history[id].eps
            let maxTs = state.history[id].last_watched_at || 0
            for (const ts of Object.values(epsObj)) {
              if (ts > maxTs) maxTs = ts
            }
            state.history[id].last_watched_at = maxTs
          }
          saveHistory()
          setStatus('History imported.')
        } catch {
          setStatus('Failed to parse history file.', true)
        }
      }
      reader.readAsText(file)
    }

    // Set status message
    function setStatus(message, isError = false) {
      const el = document.getElementById('status')
      el.textContent = message
      el.className = ''
      if (isError) el.classList.add('error')
    }

    // Format timestamp to relative time (e.g., "2h ago", "Yesterday")
    function formatRelativeTime(timestamp) {
      if (!timestamp || timestamp === 0) return null

      const now = Date.now()
      const diff = now - timestamp
      const seconds = Math.floor(diff / 1000)
      const minutes = Math.floor(seconds / 60)
      const hours = Math.floor(minutes / 60)
      const days = Math.floor(hours / 24)

      if (seconds < 60) return 'just now'
      if (minutes < 60) return `${minutes}m ago`
      if (hours < 24) return `${hours}h ago`
      if (days === 1) return 'yesterday'
      if (days < 7) return `${days}d ago`
      if (days < 30) return `${Math.floor(days / 7)}w ago`
      if (days < 365) return `${Math.floor(days / 30)}mo ago`
      return `${Math.floor(days / 365)}y ago`
    }

    // Get the most recent timestamp from local or AniList
    function getLastWatchedTimestamp(historyData) {
      const localTs = historyData.last_watched_at || 0
      const anilistTs = historyData.anilist_updated_at || 0
      return Math.max(localTs, anilistTs)
    }

    // Get the episode that was watched most recently (by timestamp)
    function getLastWatchedEpisode(historyData) {
      const epsObj = historyData.eps
      if (!epsObj || typeof epsObj !== 'object') return null
      
      let lastEp = null
      let lastTs = 0
      for (const [ep, ts] of Object.entries(epsObj)) {
        if (ts > lastTs) {
          lastTs = ts
          lastEp = Number(ep)
        }
      }
      return lastEp
    }

    // Get the highest episode number from local or AniList progress
    function getHighestEpisode(historyData) {
      // Handle both old array format and new object format
      let localMax = 0
      if (Array.isArray(historyData.eps)) {
        localMax = historyData.eps.length > 0 ? Math.max(...historyData.eps) : 0
      } else if (historyData.eps && typeof historyData.eps === 'object') {
        const eps = Object.keys(historyData.eps).map(Number)
        localMax = eps.length > 0 ? Math.max(...eps) : 0
      }
      const anilistProgress = historyData.anilist_progress || 0
      return Math.max(localMax, anilistProgress)
    }

    // Clear status
    function clearStatus() {
      document.getElementById('status').textContent = ''
    }

    // Render search results
    function renderResults(results) {
      const resultsList = document.getElementById('results')
      resultsList.innerHTML = ''
      resultsList.classList.remove('empty')

      if (!results || results.length === 0) {
        resultsList.classList.add('empty')
        resultsList.innerHTML = '<span class="empty-icon">🔍</span><p>No results found. Try a different title.</p>'
        return
      }

      results.forEach((item, i) => {
        const article = document.createElement('article')
        article.style.animationDelay = `${i * 40}ms`

        const titleEl = document.createElement('span')
        titleEl.className = 'result-title'
        titleEl.textContent = item.title

        const metaEl = document.createElement('span')
        metaEl.className = 'result-meta'
        let metaText = `${item.episodes ?? '?'} ep`

        const historyData = state.history[item.id]
        if (historyData) {
          const lastTs = getLastWatchedTimestamp(historyData)
          if (lastTs > 0) {
            const relativeTime = formatRelativeTime(lastTs)
            const lastEp = getLastWatchedEpisode(historyData)
            if (relativeTime && lastEp) {
              metaText = `${relativeTime} • Ep ${lastEp}`
            }
          } else {
            const highestEp = getHighestEpisode(historyData)
            if (highestEp > 0) {
              metaText = `Last Watched: Ep ${highestEp} • ${metaText}`
            }
          }
        }
        metaEl.textContent = metaText

        const chevronEl = document.createElement('span')
        chevronEl.className = 'result-chevron'
        chevronEl.textContent = '›'
        chevronEl.setAttribute('aria-hidden', 'true')

        article.appendChild(titleEl)
        article.appendChild(metaEl)
        article.appendChild(chevronEl)

        article.addEventListener('click', () => {
          const url = `/anime.html?id=${encodeURIComponent(item.id)}&title=${encodeURIComponent(item.title)}&mode=${state.mode}`
          window.location.href = url
        })

        resultsList.appendChild(article)
      })
    }

    // Search
    async function handleSearch(e) {
      e.preventDefault()

      const query = document.getElementById('search-input').value.trim()
      if (!query) {
        setStatus('Please enter a search query', true)
        return
      }

      // Show skeleton loaders
      const skeletonContainer = document.getElementById('results')
      skeletonContainer.classList.remove('empty')
      skeletonContainer.innerHTML = ''
      for (let i = 0; i < 5; i++) {
        const sk = document.createElement('div')
        sk.className = 'skeleton-card'
        skeletonContainer.appendChild(sk)
      }

      // Set button to busy state
      const btn = document.getElementById('search-btn')
      btn.setAttribute('aria-busy', 'true')
      btn.disabled = true

      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(query)}&mode=${state.mode}`)
        if (!res.ok) throw new Error(`HTTP ${res.status}`)

        // API returns an array directly, not { results: [] }
        const results = await res.json()

        if (!Array.isArray(results) || results.length === 0) {
          renderResults([])
          return
        }

        renderResults(results)
        clearStatus()
      } catch (error) {
        setStatus(`Error searching: ${error.message}`, true)
      } finally {
        // Remove busy state
        btn.removeAttribute('aria-busy')
        btn.disabled = false
      }
    }

    // Initialize
    loadHistory()
    document.getElementById('mode-select').addEventListener('change', e => {
      state.mode = e.target.value
    })
    document.getElementById('search-form').addEventListener('submit', handleSearch)

    // Listen for history updates from other pages (e.g., AniList sync)
    window.addEventListener('history-updated', () => {
      loadHistory()
      // Re-trigger search to update display if results are shown
      const query = document.getElementById('search-input').value.trim()
      if (query) handleSearch({ preventDefault: () => {} })
    })

    // FAB menu toggle
    document.getElementById('fab-toggle').addEventListener('click', () => {
      const menu = document.getElementById('fab-menu')
      const open = menu.classList.toggle('open')
      document.getElementById('fab-toggle').setAttribute('aria-expanded', open)
      document.getElementById('fab-toggle').textContent = open ? '✕' : '☰'
    })
    document.addEventListener('click', (e) => {
      const menu = document.getElementById('fab-menu')
      if (!menu.contains(e.target)) {
        menu.classList.remove('open')
        document.getElementById('fab-toggle').setAttribute('aria-expanded', 'false')
        document.getElementById('fab-toggle').textContent = '☰'
      }
    })

    // History import / export
    document.getElementById('export-btn').addEventListener('click', exportHistory)
    document.getElementById('import-btn').addEventListener('click', () => {
      document.getElementById('history-file-input').click()
    })
    document.getElementById('history-file-input').addEventListener('change', (e) => {
      const file = e.target.files[0]
      if (file) importHistory(file)
      e.target.value = ''
    })

    // Dark mode
    ;(function initTheme() {
      const saved = localStorage.getItem('ani-web-theme') || 'light'
      document.documentElement.setAttribute('data-theme', saved)
      const btn = document.getElementById('theme-toggle')
      btn.textContent = saved === 'light' ? '🌙' : '☀️'
      btn.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme')
        const next = current === 'light' ? 'dark' : 'light'
        document.documentElement.setAttribute('data-theme', next)
        localStorage.setItem('ani-web-theme', next)
        btn.textContent = next === 'light' ? '🌙' : '☀️'
      })
    })()

    // Initialize AniList
    initAnilist()
  </script>
</body>
</html>
