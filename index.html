<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ani-web</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css">
  <style>
    /* Compact overrides — Pico's defaults are generous, tighten for this use case */
    :root {
      --pico-font-size: 16px;
    }

    body > main {
      max-width: 860px;
      padding-inline: 1rem;
    }

    h1 { margin-bottom: 0.25rem; }

    #search-form {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    #search-form input[type="search"] {
      flex: 1;
      min-width: 180px;
      margin-bottom: 0;
    }

    #search-form select {
      width: auto;
      margin-bottom: 0;
    }

    #search-form button {
      width: auto;
      margin-bottom: 0;
    }

    #status {
      min-height: 1.4rem;
      font-size: 0.9rem;
      color: var(--pico-muted-color);
      margin: 0.5rem 0;
    }

    #status.error { color: var(--pico-del-color, #c0392b); }

    /* Results list — card-style articles */
    #results {
      margin: 0.5rem 0;
    }

    #results article {
      cursor: pointer;
      margin-bottom: 0.5rem;
      transition: filter 0.1s;
    }

    #results article:hover {
      filter: brightness(0.96);
    }
  </style>
</head>
<body>
  <main>
    <h1>ani-web</h1>
    <p><small>Search anime to watch</small></p>

    <form id="search-form">
      <input id="search-input" type="search" placeholder="Search anime..." autocomplete="off" autofocus>
      <select id="mode-select">
        <option value="sub" selected>Sub</option>
        <option value="dub">Dub</option>
      </select>
      <button id="search-btn" type="submit">Search</button>
    </form>

    <p id="status"></p>

    <div id="results"></div>
  </main>

  <script>
    const state = {
      mode: 'sub',
      history: {}
    }

    // Load history from localStorage
    function loadHistory() {
      try {
        const stored = localStorage.getItem('ani-web-history')
        if (stored) {
          state.history = JSON.parse(stored)
        }
      } catch (e) {
        state.history = {}
      }
    }

    // Save history to localStorage
    function saveHistory() {
      localStorage.setItem('ani-web-history', JSON.stringify(state.history))
    }

    // Set status message
    function setStatus(message, isError = false) {
      const el = document.getElementById('status')
      el.textContent = message
      el.className = ''
      if (isError) el.classList.add('error')
    }

    // Clear status
    function clearStatus() {
      document.getElementById('status').textContent = ''
    }

    // Render search results
    function renderResults(results) {
      const resultsList = document.getElementById('results')
      resultsList.innerHTML = ''

      results.forEach(item => {
        const article = document.createElement('article')
        article.style.cursor = 'pointer'

        const row = document.createElement('div')
        row.style.cssText = 'display:flex; justify-content:space-between; align-items:center;'

        const title = document.createElement('strong')
        title.textContent = item.title

        const chevron = document.createElement('span')
        chevron.textContent = '›'
        chevron.setAttribute('aria-hidden', 'true')

        row.appendChild(title)
        row.appendChild(chevron)

        const episodes = document.createElement('small')
        episodes.textContent = `${item.episodes ?? '?'} episodes`

        article.appendChild(row)
        article.appendChild(episodes)

        article.addEventListener('click', () => {
          const url = `/anime.html?id=${encodeURIComponent(item.id)}&title=${encodeURIComponent(item.title)}&mode=${state.mode}`
          window.location.href = url
        })

        resultsList.appendChild(article)
      })
    }

    // Search
    async function handleSearch(e) {
      e.preventDefault()

      const query = document.getElementById('search-input').value.trim()
      if (!query) {
        setStatus('Please enter a search query', true)
        return
      }

      // Clear old results
      document.getElementById('results').innerHTML = ''

      // Set button to busy state
      const btn = document.getElementById('search-btn')
      btn.setAttribute('aria-busy', 'true')
      btn.disabled = true

      setStatus('Searching...')

      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(query)}&mode=${state.mode}`)
        if (!res.ok) throw new Error(`HTTP ${res.status}`)

        // API returns an array directly, not { results: [] }
        const results = await res.json()

        if (!Array.isArray(results) || results.length === 0) {
          setStatus('No results found')
          return
        }

        renderResults(results)
        clearStatus()
      } catch (error) {
        setStatus(`Error searching: ${error.message}`, true)
      } finally {
        // Remove busy state
        btn.removeAttribute('aria-busy')
        btn.disabled = false
      }
    }

    // Initialize
    loadHistory()
    document.getElementById('mode-select').addEventListener('change', e => {
      state.mode = e.target.value
    })
    document.getElementById('search-form').addEventListener('submit', handleSearch)
  </script>
</body>
</html>
