<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ani-web</title>
  <meta name="description" content="Watch anime episodes — powered by ani-web">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdn.plyr.io">

  <!-- Pico CSS -->
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css"></noscript>
  <script>
    // Generate favicon from kaomoji — no image file needed
    const canvas = document.createElement('canvas')
    canvas.width = 64
    canvas.height = 64
    const ctx = canvas.getContext('2d')
    ctx.font = '44px serif'
    ctx.textAlign = 'center'
    ctx.textBaseline = 'middle'
    ctx.fillText('ﾉ◕', 32, 32)
    const link = document.createElement('link')
    link.rel = 'icon'
    link.href = canvas.toDataURL()
    document.head.appendChild(link)
  </script>
  <script src="/anilist.js"></script>

  <!-- Plyr CSS -->
  <link rel="preload" as="style" href="https://cdn.plyr.io/3.8.4/plyr.css" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdn.plyr.io/3.8.4/plyr.css"></noscript>

  <style>
    :root {
      --pico-font-size: 16px;
      --ani-accent: #ff0000;
      --ani-accent-hover: #cc0000;
      --ani-accent-light: #fff0f0;
      --ani-btn-color: #373c44;
    }

    html[data-theme="dark"] {
      --ani-accent-light: #2a0000;
      --ani-btn-color: #c2c7d0;
    }

    body > main {
      max-width: 860px;
    }

    a.back-link {
      display: inline-block;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    h1 {
      margin-bottom: 0.25rem;
    }

    /* ── FAB Menu ── */
    #fab-menu {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.5rem;
    }

    #fab-menu #fab-toggle {
      --pico-color: var(--pico-form-element-color);
      --pico-background-color: var(--pico-form-element-background-color);
      --pico-border-color: var(--pico-form-element-border-color);
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      line-height: 1;
      padding: 0;
      transition: background 0.2s, transform 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    #fab-menu #fab-toggle:hover {
      transform: scale(1.1);
      background: var(--ani-accent-light);
    }

    #fab-items {
      display: none;
      flex-direction: column;
      gap: 0.5rem;
    }

    #fab-menu.open #fab-items {
      display: flex;
      animation: fab-reveal 0.15s ease;
    }

    @keyframes fab-reveal {
      from {
        opacity: 0;
        transform: translateY(-6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── FAB Buttons ── */
    #fab-menu #fab-items button {
      --pico-color: var(--pico-form-element-color);
      --pico-background-color: var(--pico-form-element-background-color);
      --pico-border-color: var(--pico-form-element-border-color);
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1;
      padding: 0;
      transition: background 0.2s, transform 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      position: relative;
    }

    #fab-menu #fab-items button::after {
      content: attr(aria-label);
      position: absolute;
      right: calc(100% + 10px);
      top: 50%;
      transform: translateY(-50%) scale(0.9);
      opacity: 0;
      pointer-events: none;
      background: var(--pico-color);
      color: var(--pico-background-color);
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 500;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.2s;
    }

    #fab-menu #fab-items button:hover::after {
      opacity: 1;
      transform: translateY(-50%) scale(1);
    }

    #fab-menu #fab-items button:hover {
      transform: scale(1.1);
      background: var(--ani-accent-light);
    }

    #theme-toggle {
      font-size: 1.2rem;
    }

    /* ── Status & load bar ── */
    #status {
      min-height: 1.4rem;
      font-size: 0.9rem;
      color: var(--pico-muted-color);
      margin: 0.5rem 0;
    }

    #status.error {
      color: var(--pico-del-color, #c0392b);
    }

    #load-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      margin: 0;
      padding: 0;
      border: none;
      border-radius: 0;
      display: none;
      z-index: 9999;
      background: #e8e8e8;
      accent-color: var(--ani-accent);
    }

    /* ── Episode section ── */
    #episode-section {
      margin: 1rem 0;
    }

    /* Jump-to bar */
    #episode-filter {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    #episode-filter label {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--pico-muted-color);
    }

    #ep-jump {
      width: 80px;
      padding: 0.35rem 0.6rem;
      border: 1px solid var(--pico-form-element-border-color);
      border-radius: 6px;
      font-size: 0.9rem;
      background: var(--pico-form-element-background-color);
      color: var(--pico-color);
      margin: 0;
    }

    #ep-jump:focus {
      outline: none;
      border-color: var(--ani-accent);
      box-shadow: 0 0 0 3px var(--ani-accent-light);
    }

    #ep-jump-btn {
      padding: 0.35rem 0.8rem;
      font-size: 0.88rem;
      font-weight: 600;
      background: var(--ani-accent);
      border-color: var(--ani-accent);
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      margin: 0;
      width: auto;
    }

    #ep-jump-btn:hover {
      background: var(--ani-accent-hover);
      border-color: var(--ani-accent-hover);
    }

    /* Episode group label */
    .episode-group-label {
      grid-column: 1 / -1;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--ani-accent);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-top: 0.75rem;
      margin-bottom: 0.1rem;
      padding-bottom: 0.25rem;
      border-bottom: 1px solid var(--ani-accent-light);
    }

    .episode-group-label:first-child {
      margin-top: 0;
    }

    /* Episode grid */
    #episodes {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
      gap: 0.4rem;
      margin: 0;
    }

    /* Episode buttons */
    .episode-btn {
      padding: 0.45rem 0.4rem;
      font-size: 0.82rem;
      font-weight: 500;
      text-align: center;
      background: var(--pico-form-element-background-color);
      color: var(--ani-btn-color);
      border: 1px solid var(--pico-form-element-border-color);
      border-radius: var(--pico-border-radius);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s, transform 0.15s;
      position: relative;
    }

    .episode-btn:hover {
      border-color: var(--ani-accent);
      color: var(--ani-accent);
      background: var(--ani-accent-light);
      transform: scale(1.05);
    }

    .episode-btn.active {
      background: var(--ani-accent);
      border-color: var(--ani-accent);
      color: #fff;
      font-weight: 700;
      box-shadow: 0 0 0 2px var(--ani-accent-light);
    }

    /* Watched: subtle red tint + checkmark badge */
    .episode-btn.watched {
      background: var(--ani-accent-light);
      border-color: color-mix(in srgb, var(--ani-accent) 40%, transparent);
      color: var(--ani-accent);
      opacity: 0.75;
    }

    .episode-btn.watched::after {
      content: '✓';
      position: absolute;
      bottom: -4px;
      right: -4px;
      width: 14px;
      height: 14px;
      background: var(--ani-accent);
      color: #fff;
      border-radius: 50%;
      font-size: 0.55rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 14px;
      text-align: center;
    }

    /* Last-watched ring */
    .episode-btn.last-watched {
      outline: 2px solid var(--ani-accent);
      outline-offset: 2px;
    }

    /* ── Player section ── */
    #player-section {
      margin: 1rem 0;
    }

    .plyr__video-wrapper {
      background: #000;
    }

    video {
      width: 100%;
      height: auto;
      display: block;
    }

    #quality-bar {
      margin-top: 0.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.5rem;
      background: var(--pico-form-element-background-color);
      border-radius: var(--pico-border-radius);
    }

    .quality-btn {
      padding: 0.4rem 0.8rem;
      font-size: 0.85rem;
      background: var(--pico-form-element-background-color);
      color: var(--pico-color);
      border: 1px solid var(--pico-form-element-border-color);
      border-radius: var(--pico-border-radius);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }

    .quality-btn:hover {
      border-color: var(--ani-accent);
      color: var(--ani-accent);
      background: var(--ani-accent-light);
    }

    .quality-btn.active {
      background: var(--ani-accent);
      border-color: var(--ani-accent);
      color: #fff;
      font-weight: 600;
    }

    /* Plyr red accent */
    .plyr {
      --plyr-color-main: var(--ani-accent);
    }

    /* Double-tap seek indicator */
    #seek-indicator {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      padding: 0.4rem 0.8rem;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      border-radius: 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
    }

    #seek-indicator.show     { opacity: 1; }
    #seek-indicator.seek-left  { left: 12%; }
    #seek-indicator.seek-right { right: 12%; }

    /* ── Keyboard shortcut help ── */
    #keyboard-help {
      display: none;
      font-size: 0.85rem;
      color: var(--pico-color);
      margin-top: 0.5rem;
      padding: 0.75rem 1rem;
      background: var(--pico-form-element-background-color);
      border-radius: var(--pico-border-radius);
      border-left: 4px solid var(--ani-accent);
      line-height: 1.75;
    }

    #keyboard-help.show {
      display: block;
    }

    #keyboard-help strong {
      color: var(--ani-accent);
    }

    #keyboard-help code {
      display: inline-block;
      background: var(--pico-code-background-color, #f4f4f4);
      color: var(--ani-accent);
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      border: 1px solid var(--pico-form-element-border-color);
      border-bottom: 2px solid var(--ani-accent);
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      font-weight: 600;
      margin: 0 0.15rem;
    }
  </style>
</head>
<body>
  <div id="fab-menu">
    <button id="fab-toggle" aria-label="Menu" aria-expanded="false">☰</button>
    <div id="fab-items">
      <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
      <button id="export-btn" aria-label="Export watch history">↓</button>
      <button id="import-btn" aria-label="Import watch history">↑</button>
      <input id="history-file-input" type="file" accept=".json" style="display:none">
    </div>
  </div>
  <main>
    <a href="/" class="back-link">← Back</a>
    <h1 id="anime-title">…</h1>
    <div id="anilist-status" style="font-size: 0.9rem; color: var(--pico-muted-color); margin-bottom: 1rem; display: none;"></div>
    <progress id="load-bar"></progress>
    <p id="status"></p>

    <section id="episode-section">
      <div id="episode-filter">
        <label for="ep-jump">Jump to:</label>
        <input id="ep-jump" type="number" min="1" placeholder="Ep #">
        <button id="ep-jump-btn" type="button">Go</button>
      </div>
      <div id="episodes"></div>
    </section>

    <section id="player-section" hidden>
      <!-- Plyr video player -->
      <video id="player" playsinline controls></video>

      <!-- Quality level buttons (populated by hls.js) -->
      <div id="quality-bar" style="display: none;"></div>

      <!-- Keyboard shortcuts help (toggle with ? key) -->
      <div id="keyboard-help">
        <strong>Keyboard shortcuts:</strong><br>
        <code>Space</code> / <code>K</code> Play/Pause •
        <code>←</code> / <code>→</code> Seek −5s / +5s •
        <code>↑</code> / <code>↓</code> Volume +10% / −10% •
        <code>M</code> Mute • <code>F</code> Fullscreen •
        <code>C</code> Captions • <code>L</code> Loop •
        <code>0–9</code> Seek to 0%–90% •
        <code>?</code> Hide this<br>
        <strong>Mobile:</strong> Double-tap left / right to seek −10s / +10s
      </div>
    </section>
  </main>

  <!-- hls.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.15/dist/hls.min.js"></script>

  <!-- Plyr -->
  <script src="https://cdn.plyr.io/3.8.4/plyr.js"></script>

  <script>
    // =========================================================================
    // STATE MANAGEMENT
    // =========================================================================
    const state = {
      mode: 'sub',
      animeId: null,
      animeTitle: null,
      currentEp: null,
      sources: [],
      history: {},
      hlsInstance: null,
      plyrInstance: null,
      videoListenersAttached: false
    }

    // =========================================================================
    // UI UTILITIES
    // =========================================================================

    function loadHistory() {
      try {
        const stored = localStorage.getItem('ani-web-history')
        if (stored) {
          state.history = JSON.parse(stored)
        }
      } catch (e) {
        state.history = {}
      }
    }

    function saveHistory() {
      localStorage.setItem('ani-web-history', JSON.stringify(state.history))
    }

    // Export history as a JSON file download
    function exportHistory() {
      const json = JSON.stringify(state.history, null, 2)
      const blob = new Blob([json], { type: 'application/json' })
      const url = URL.createObjectURL(blob)
      const a = document.createElement('a')
      a.href = url
      a.download = 'ani-web-history.json'
      a.click()
      URL.revokeObjectURL(url)
    }

    // Import history from a JSON file, merging with existing data
    function importHistory(file) {
      const reader = new FileReader()
      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result)
          if (typeof imported !== 'object' || imported === null || Array.isArray(imported)) {
            setStatus('Invalid history file.', true)
            return
          }
          for (const [id, eps] of Object.entries(imported)) {
            if (!Array.isArray(eps)) continue
            if (!state.history[id]) state.history[id] = []
            const set = new Set(state.history[id])
            eps.forEach(ep => set.add(ep))
            state.history[id] = [...set].sort((a, b) => a - b)
          }
          saveHistory()
          setStatus('History imported.')
          // Re-render episode grid so watched badges reflect the imported data
          const episodesList = document.getElementById('episodes')
          if (episodesList.children.length > 0 && state.animeId) {
            const episodes = [...episodesList.querySelectorAll('.episode-btn')]
              .map(btn => Number(btn.getAttribute('data-ep')))
            renderEpisodeList(episodes)
          }
        } catch {
          setStatus('Failed to parse history file.', true)
        }
      }
      reader.readAsText(file)
    }

    function setStatus(message, isError = false) {
      const el = document.getElementById('status')
      el.textContent = message
      el.className = ''
      if (isError) el.classList.add('error')
    }

    function clearStatus() {
      document.getElementById('status').textContent = ''
    }

    function showLoading() {
      document.getElementById('load-bar').style.display = ''
    }

    function hideLoading() {
      document.getElementById('load-bar').style.display = 'none'
    }

    // =========================================================================
    // MOBILE GESTURE ENHANCEMENTS
    // =========================================================================

    /**
     * Double-tap left/right half of the player to seek −10s / +10s.
     * Shows a brief overlay indicator (YouTube-style).
     */
    function initDoubleTapSeek(plyr) {
      const container = plyr.elements.container
      if (!container) return

      // Indicator overlay (created once, lives inside the container)
      const indicator = document.createElement('div')
      indicator.id = 'seek-indicator'
      container.appendChild(indicator)

      let lastTap = 0
      let tapTimer = null

      container.addEventListener('touchend', (e) => {
        // Ignore taps on the control bar so normal UI interactions aren't disrupted
        if (e.target.closest('.plyr__controls')) return

        const now = Date.now()
        const delta = now - lastTap

        if (delta < 300 && delta > 0) {
          clearTimeout(tapTimer)
          const rect = container.getBoundingClientRect()
          const isRight = e.changedTouches[0].clientX > rect.left + rect.width / 2
          plyr.currentTime = Math.max(0, plyr.currentTime + (isRight ? 10 : -10))

          indicator.textContent = isRight ? '▶▶ 10s' : '10s ◀◀'
          indicator.className = isRight ? 'seek-right show' : 'seek-left show'
          clearTimeout(indicator._timer)
          indicator._timer = setTimeout(() => indicator.classList.remove('show'), 600)

          lastTap = 0
        } else {
          lastTap = now
        }
      }, { passive: true })
    }

    /**
     * Improve touch-drag scrubbing on the progress bar.
     * Plyr's default touch handling can be imprecise; this translates
     * finger X position directly to a seek time.
     */
    function initTouchScrub(plyr) {
      // Wait a tick for Plyr to finish building the DOM
      requestAnimationFrame(() => {
        const progressEl = plyr.elements.progress
        if (!progressEl) return

        let scrubbing = false

        progressEl.addEventListener('touchstart', () => { scrubbing = true },  { passive: true })
        progressEl.addEventListener('touchend',   () => { scrubbing = false }, { passive: true })
        progressEl.addEventListener('touchmove', (e) => {
          if (!scrubbing || !plyr.duration) return
          const rect = progressEl.getBoundingClientRect()
          const ratio = Math.max(0, Math.min(1,
            (e.touches[0].clientX - rect.left) / rect.width
          ))
          plyr.currentTime = ratio * plyr.duration
        }, { passive: true })
      })
    }

    // =========================================================================
    // PLAYER INITIALIZATION
    // =========================================================================

    /**
     * Initialize Plyr player with custom options
     * Plyr will be initialized once, then reused for different sources
     */
    function initPlyr() {
      if (state.plyrInstance) return state.plyrInstance

      const videoEl = document.getElementById('player')
      state.plyrInstance = new Plyr(videoEl, {
        // Remove quality selector since we'll use hls.js levels
        controls: [
          'play-large',
          'play',
          'progress',
          'current-time',
          'mute',
          'volume',
          'settings',
          'pip',
          'airplay',
          'fullscreen'
        ],
        settings: ['autoplay', 'speed', 'loop'],
        autoplay: false,
        keyboard: { focused: true, global: false },
        invertTime: false,
        disableContextMenu: false
      })

      initDoubleTapSeek(state.plyrInstance)
      initTouchScrub(state.plyrInstance)

      return state.plyrInstance
    }

    // =========================================================================
    // CONFIGURATION
    // =========================================================================

    // Set to false to use direct URLs (bypasses proxy, but may fail if CDN blocks CORS)
    const USE_PROXY = false;

    // =========================================================================
    // PROXY & HLS SETUP
    // =========================================================================

    function proxyUrl(url) {
      if (!USE_PROXY) {
        console.log('Using direct URL (no proxy):', url);
        return url;
      }
      return `/api/proxy?url=${encodeURIComponent(url)}`
    }

    /**
     * Attach video event listeners for loading indicator
     * These show/hide the progress bar while buffering
     */
    function attachVideoListeners() {
      if (state.videoListenersAttached) return

      const video = document.getElementById('player')
      video.addEventListener('waiting', showLoading)
      video.addEventListener('playing', hideLoading)
      video.addEventListener('canplay', hideLoading)

      // Automatic AniList tracking
      video.addEventListener('timeupdate', async () => {
        if (!window.anilistState || !window.anilistState.token || !state.anilistMediaId) return
        
        const epNo = parseInt(state.currentEp)
        if (isNaN(epNo)) return

        // Skip if we already tracked this episode or if it's less than current progress
        if (state.anilistTrackedEp === epNo) return
        if (state.anilistProgress && epNo <= state.anilistProgress) return
        
        // Track at 80% completion
        if (video.duration > 0 && (video.currentTime / video.duration) >= 0.8) {
          state.anilistTrackedEp = epNo
          const result = await window.updateAnilistProgress(state.anilistMediaId, epNo)
          if (result) {
            state.anilistProgress = result.progress
            const statusEl = document.getElementById('anilist-status')
            const title = document.getElementById('anime-title').textContent
            if (statusEl) {
              statusEl.innerHTML = `AniList: <a href="https://anilist.co/anime/${state.anilistMediaId}" target="_blank" style="color: inherit; text-decoration: underline;">${title}</a> • Watched Ep <b>${result.progress}</b>`
            }
          }
        }
      })

      state.videoListenersAttached = true
    }

    // =========================================================================
    // QUALITY LEVEL MANAGEMENT
    // =========================================================================

    /**
     * Render quality buttons based on hls.js levels
     * This is called after MANIFEST_PARSED event
     */
    function renderQualityBar() {
      const hls = state.hlsInstance
      const qualityBar = document.getElementById('quality-bar')

      if (!hls || !hls.levels || hls.levels.length === 0) {
        qualityBar.style.display = 'none'
        return
      }

      qualityBar.innerHTML = ''
      qualityBar.style.display = ''

      // Add "Auto" button
      const autoBtn = document.createElement('button')
      autoBtn.className = 'quality-btn'
      autoBtn.textContent = 'Auto'
      autoBtn.addEventListener('click', () => {
        // Set to -1 for auto quality selection
        hls.currentLevel = -1
        updateQualityButtons()
      })
      qualityBar.appendChild(autoBtn)

      // Add quality level buttons
      hls.levels.forEach((level, index) => {
        const btn = document.createElement('button')
        btn.className = 'quality-btn'
        btn.setAttribute('data-level', index)

        // Format: "1080p @ 5 Mbps" or just "1080p"
        const height = level.height ? `${level.height}p` : `Quality ${index}`
        const bitrate = level.bitrate ? ` @ ${(level.bitrate / 1000000).toFixed(1)} Mbps` : ''
        btn.textContent = height + bitrate

        btn.addEventListener('click', () => {
          hls.currentLevel = index
          updateQualityButtons()
        })

        qualityBar.appendChild(btn)
      })

      updateQualityButtons()
    }

    /**
     * Update quality button active state
     */
    function updateQualityButtons() {
      const hls = state.hlsInstance
      const qualityBar = document.getElementById('quality-bar')
      const buttons = qualityBar.querySelectorAll('.quality-btn')

      buttons.forEach((btn, index) => {
        btn.classList.remove('active')
        if (btn.textContent === 'Auto' && hls.currentLevel === -1) {
          btn.classList.add('active')
        } else if (btn.getAttribute('data-level') == hls.currentLevel) {
          btn.classList.add('active')
        }
      })
    }

    // =========================================================================
    // SOURCE PLAYBACK
    // =========================================================================

    /**
     * Load and play a source (HLS or direct)
     * Handles both HLS streams (via hls.js) and direct MP4/WebM URLs
     */
    function playSource(source) {
      const video = document.getElementById('player')

      // Destroy previous HLS instance
      if (state.hlsInstance) {
        state.hlsInstance.destroy()
        state.hlsInstance = null
      }

      // Initialize Plyr if needed
      if (!state.plyrInstance) {
        initPlyr()
      }

      attachVideoListeners()

      // Clear video source
      video.src = ''
      video.textContent = ''

      if (source.hls && window.Hls) {
        // HLS via hls.js
        if (Hls.isSupported()) {
          const hls = new Hls({
            debug: false,
            enableWorker: true,
            defaultAudioCodec: 'aac',
            lowLatencyMode: false,
            // Mobile: let ABR pick start level, assume modest bandwidth initially
            startLevel: -1,
            abrEwmaDefaultEstimate: 500000,
            // Smaller buffer saves memory on mobile (default: 30s / 600s)
            maxBufferLength: 20,
            maxMaxBufferLength: 60,
          })

          state.hlsInstance = hls

          // Load the manifest
          hls.loadSource(proxyUrl(source.url))
          hls.attachMedia(video)

          // CRITICAL: Only play after manifest is parsed and quality levels are loaded
          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            renderQualityBar()
            video.play().catch(() => {
              // Autoplay policy may block this — user must click play
            })
          })

          // Handle errors
          hls.on(Hls.Events.ERROR, (event, data) => {
            if (data.fatal) {
              switch (data.type) {
                case Hls.ErrorTypes.NETWORK_ERROR:
                  setStatus('Network error — check your connection', true)
                  break
                case Hls.ErrorTypes.MEDIA_ERROR:
                  setStatus('Media error — stream may be unavailable', true)
                  break
                default:
                  setStatus(`Error: ${data.reason}`, true)
              }
            }
          })

          // Listen for quality level changes (for future UI updates)
          hls.on(Hls.Events.LEVEL_SWITCHED, () => {
            updateQualityButtons()
          })
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          // Safari/iOS native HLS support
          video.src = proxyUrl(source.url)
          video.play().catch(() => {})
          document.getElementById('quality-bar').style.display = 'none'
        } else {
          setStatus('HLS not supported on this browser', true)
        }
      } else {
        // Direct URL (MP4, WebM, etc.)
        video.src = proxyUrl(source.url)
        video.play().catch(() => {})
        document.getElementById('quality-bar').style.display = 'none'
      }
    }

    // =========================================================================
    // EPISODE MANAGEMENT
    // =========================================================================

    /**
     * Load and play an episode
     * Fetches sources from API and initiates playback
     */
    async function loadEpisode(e, epNo) {
      const btn = e.currentTarget
      const episodesList = document.getElementById('episodes')

      // Highlight active episode button
      episodesList.querySelectorAll('.episode-btn').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')

      // Set busy state
      btn.setAttribute('aria-busy', 'true')
      btn.disabled = true
      showLoading()

      try {
        const res = await fetch(`/api/resolve?id=${encodeURIComponent(state.animeId)}&ep=${encodeURIComponent(epNo)}&mode=${state.mode}`)
        if (!res.ok) throw new Error(`HTTP ${res.status}`)

        const data = await res.json()
        state.sources = data.sources || []
        state.currentEp = epNo

        if (state.sources.length === 0) {
          throw new Error('No sources available for this episode')
        }

        // Show player section
        document.getElementById('player-section').removeAttribute('hidden')

        // Play first source
        playSource(state.sources[0])

        // Save to history
        if (!state.history[state.animeId]) {
          state.history[state.animeId] = []
        }
        if (!state.history[state.animeId].includes(epNo)) {
          state.history[state.animeId].push(epNo)
        }
        saveHistory()

        // Update watched state
        btn.textContent = epNo
        btn.classList.add('watched')
        // Move last-watched marker
        document.querySelectorAll('.episode-btn.last-watched').forEach(b => b.classList.remove('last-watched'))
        btn.classList.add('last-watched')

        clearStatus()
      } catch (error) {
        setStatus(`Error loading episode: ${error.message}`, true)
        btn.classList.remove('active')
      } finally {
        btn.removeAttribute('aria-busy')
        btn.disabled = false
        hideLoading()
      }
    }

    /**
     * Load and display available episodes
     */
    async function loadEpisodes() {
      showLoading()

      try {
        const res = await fetch(`/api/episodes?id=${encodeURIComponent(state.animeId)}&mode=${state.mode}`)
        if (!res.ok) throw new Error(`HTTP ${res.status}`)

        const episodes = await res.json()

        if (!Array.isArray(episodes) || episodes.length === 0) {
          setStatus('No episodes found', true)
          return
        }

        renderEpisodeList(episodes)
        clearStatus()
      } catch (error) {
        setStatus(`Error loading episodes: ${error.message}`, true)
      } finally {
        hideLoading()
      }
    }

    function renderEpisodeList(episodes) {
      const episodesList = document.getElementById('episodes')
      episodesList.innerHTML = ''

      const watched = state.history[state.animeId] || []
      const lastWatched = watched.length > 0 ? watched[watched.length - 1] : null

      const groupSize = 12
      for (let i = 0; i < episodes.length; i += groupSize) {
        const group = episodes.slice(i, i + groupSize)
        const start = group[0]
        const end = group[group.length - 1]

        const label = document.createElement('div')
        label.className = 'episode-group-label'
        label.textContent = start === end ? `Episode ${start}` : `Episodes ${start}–${end}`
        episodesList.appendChild(label)

        group.forEach(epNo => {
          const btn = document.createElement('button')
          btn.className = 'episode-btn'
          btn.setAttribute('data-ep', epNo)
          btn.textContent = epNo

          if (watched.includes(epNo)) {
            btn.classList.add('watched')
          }
          if (epNo === lastWatched) {
            btn.classList.add('last-watched')
          }

          btn.addEventListener('click', (e) => loadEpisode(e, epNo))
          episodesList.appendChild(btn)
        })
      }
    }

    // =========================================================================
    // KEYBOARD SHORTCUTS (Custom)
    // =========================================================================

    /**
     * Custom keyboard shortcuts for player control
     * Plyr provides many defaults, but we add custom ones here
     */
    document.addEventListener('keydown', (e) => {
      const video = document.getElementById('player')
      const keyboardHelp = document.getElementById('keyboard-help')

      // Only handle if player is visible and focused
      if (!state.plyrInstance || document.getElementById('player-section').hidden) {
        return
      }

      switch (e.key) {
        case '?':
          // Toggle keyboard help
          e.preventDefault()
          keyboardHelp.classList.toggle('show')
          break
      }
    })

    // =========================================================================
    // INITIALIZATION
    // =========================================================================

    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search)
      const id = params.get('id')
      const title = params.get('title')
      const mode = params.get('mode')

      if (!id) {
        window.location.href = '/'
        return
      }

      state.animeId = id
      state.animeTitle = title || 'Anime'
      state.mode = mode || 'sub'

      document.title = `${state.animeTitle} — (ﾉ◕ヮ◕)ﾉ ani-web`
      document.getElementById('anime-title').textContent = state.animeTitle

      loadHistory()
      loadEpisodes()

      // FAB menu toggle
      document.getElementById('fab-toggle').addEventListener('click', () => {
        const menu = document.getElementById('fab-menu')
        const open = menu.classList.toggle('open')
        document.getElementById('fab-toggle').setAttribute('aria-expanded', open)
        document.getElementById('fab-toggle').textContent = open ? '✕' : '☰'
      })
      document.addEventListener('click', (e) => {
        const menu = document.getElementById('fab-menu')
        if (!menu.contains(e.target)) {
          menu.classList.remove('open')
          document.getElementById('fab-toggle').setAttribute('aria-expanded', 'false')
          document.getElementById('fab-toggle').textContent = '☰'
        }
      })

      // History import / export
      document.getElementById('export-btn').addEventListener('click', exportHistory)
      document.getElementById('import-btn').addEventListener('click', () => {
        document.getElementById('history-file-input').click()
      })
      document.getElementById('history-file-input').addEventListener('change', (e) => {
        const file = e.target.files[0]
        if (file) importHistory(file)
        e.target.value = ''
      })

      document.getElementById('ep-jump-btn').addEventListener('click', () => {
        const val = parseInt(document.getElementById('ep-jump').value)
        if (isNaN(val)) return
        const btn = document.querySelector(`.episode-btn[data-ep="${val}"]`)
        if (btn) {
          btn.scrollIntoView({ behavior: 'smooth', block: 'center' })
          btn.focus()
        } else {
          setStatus(`Episode ${val} not found`, true)
        }
      })

      document.getElementById('ep-jump').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('ep-jump-btn').click()
      })
    })

    // Dark mode
    ;(function initTheme() {
      const saved = localStorage.getItem('ani-web-theme') || 'light'
      document.documentElement.setAttribute('data-theme', saved)
      const btn = document.getElementById('theme-toggle')
      btn.textContent = saved === 'light' ? '🌙' : '☀️'
      btn.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme')
        const next = current === 'light' ? 'dark' : 'light'
        document.documentElement.setAttribute('data-theme', next)
        localStorage.setItem('ani-web-theme', next)
        btn.textContent = next === 'light' ? '🌙' : '☀️'
      })
    })()

    // Initialize AniList and map title
    ;(async function setupAnilist() {
      await initAnilist()
      if (anilistState.token && state.animeTitle) {
        const statusEl = document.getElementById('anilist-status')
        statusEl.style.display = 'block'
        statusEl.textContent = 'AniList: Searching...'

        const media = await searchAnilistAnime(state.animeTitle)
        if (media) {
          state.anilistMediaId = media.id
          const progress = media.mediaListEntry ? media.mediaListEntry.progress : 0
          state.anilistProgress = progress
          
          const title = media.title.romaji || media.title.english || 'Anime'
          statusEl.innerHTML = `AniList: <a href="https://anilist.co/anime/${media.id}" target="_blank" style="color: inherit; text-decoration: underline;">${title}</a> • Watched Ep <b>${progress}</b>`
        } else {
          statusEl.textContent = 'AniList: Title not found'
        }
      }
    })()
  </script>
</body>
